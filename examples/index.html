<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RemuruJS Engine Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-6">

  <div id="app" class="w-full max-w-md"></div>

  <script type="module">
    import { RemuruRuntime, createSignal, createEffect } from '../src/index.ts';
    
    const runtime = new RemuruRuntime();
    const root = document.getElementById('app');
    
    // 1. Establish unified atomic signals
    const count = createSignal(0);
    const systemStatus = createSignal('Idle');
    const pipelineSpeed = createSignal(16); // Execution latency target in ms

    // Combined interactive action callback
    window.__handleIncrement = () => {
      count.value += 1;
      systemStatus.value = 'Accelerating...';
      
      // Simulate real-time AI auto-tuning optimization metric adjustments
      if (count.value > 5) {
        pipelineSpeed.value = 8; // Auto-tuned path optimization threshold
        systemStatus.value = 'AI Optimized (Hyper-Drive)';
      }
    };

    // 2. Continuous Reactive Effect Stream
    createEffect(() => {
      // Clear the execution caches to bypass traditional V-DOM reconciliation diffs
      runtime.clear();
      if (root) root.innerHTML = ''; 

      // 3. Raw low-level browser instruction definitions
      runtime.execute([
        // Main Container Box (Utilizing custom layout macros matching vite-plugin-quantum-css expectations)
        { type: 'CREATE', target: 'panel', value: 'div' },
        { type: 'ATTR', target: 'panel', name: 'qClass', value: 'bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-4' },
        { type: 'ATTR', target: 'panel', name: 'class', value: 'bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-4' },

        // Header Title
        { type: 'CREATE', target: 'title', value: 'h2' },
        { type: 'ATTR', target: 'title', name: 'class', value: 'text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500' },
        { type: 'TEXT', target: 'titleText', value: 'REMURU JS CONTROL CENTER' },
        { type: 'APPEND', target: 'titleText', name: 'title' },
        { type: 'APPEND', target: 'title', name: 'panel' },

        // Metrics Display Section
        { type: 'CREATE', target: 'statsGrid', value: 'div' },
        { type: 'ATTR', target: 'statsGrid', name: 'class', value: 'grid grid-cols-2 gap-3 text-sm bg-slate-900/50 p-4 rounded-xl border border-slate-800' },

        // Metric Block: Iterations
        { type: 'CREATE', target: 'metricA', value: 'p' },
        { type: 'TEXT', target: 'textA', value: `⚡ Cycles: ${count.value}` },
        { type: 'APPEND', target: 'textA', name: 'metricA' },
        { type: 'APPEND', target: 'metricA', name: 'statsGrid' },

        // Metric Block: Framework Frame Pipeline Speed
        { type: 'CREATE', target: 'metricB', value: 'p' },
        { type: 'TEXT', target: 'textB', value: `⏱️ Frame Cost: ${pipelineSpeed.value}ms` },
        { type: 'APPEND', target: 'textB', name: 'metricB' },
        { type: 'APPEND', target: 'metricB', name: 'statsGrid' },
        { type: 'APPEND', target: 'statsGrid', name: 'panel' },

        // Dynamic System Status Banner
        { type: 'CREATE', target: 'statusBox', value: 'div' },
        { type: 'ATTR', target: 'statusBox', name: 'class', value: `p-3 rounded-lg text-center font-mono text-xs ${count.value > 5 ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-blue-500/10 text-blue-400 border border-blue-500/20'}` },
        { type: 'TEXT', target: 'statusText', value: `Status: ${systemStatus.value}` },
        { type: 'APPEND', target: 'statusText', name: 'statusBox' },
        { type: 'APPEND', target: 'statusBox', name: 'panel' },

        // Interactive Button Vector (Demonstrates deep nested variant scoping via attributes)
        { type: 'CREATE', target: 'actionBtn', value: 'button' },
        { type: 'ATTR', target: 'actionBtn', name: 'qClass', value: 'w-full p-3 interactive-primary bg-cyan-500 text-slate-900 rounded-xl font-bold transition-all hover(bg-cyan-400 scale-102 shadow-[0_0_20px_rgba(34,211,238,0.3)]).active(scale-98)' },
        { type: 'ATTR', target: 'actionBtn', name: 'class', value: 'w-full p-3 bg-cyan-500 text-slate-900 rounded-xl font-bold transition-all hover:bg-cyan-400 hover:scale-105 active:scale-95 duration-150' },
        { type: 'LISTEN', target: 'actionBtn', name: 'click', value: window.__handleIncrement },
        { type: 'TEXT', target: 'btnText', value: 'Pulse Quantum State' },
        { type: 'APPEND', target: 'btnText', name: 'actionBtn' },
        { type: 'APPEND', target: 'actionBtn', name: 'panel' },

        // Mount the completely composed structural node straight into the container application
        { type: 'APPEND', target: 'panel', name: 'root' }
      ], root);
    });
  </script>
</body>
</html>
